<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Savings</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#0f1115;
color:white;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:28px;
font-weight:700;
}

.premium{
background:linear-gradient(90deg,#ff7a18,#32d2aa);
padding:8px 16px;
border-radius:20px;
font-size:14px;
}

.goal-card{
background:#181c23;
padding:18px;
border-radius:18px;
margin-top:10px;
}

.goal-top{
display:flex;
align-items:center;
gap:15px;
}

.icon{
font-size:28px;
background:#222733;
padding:12px;
border-radius:12px;
}

.goal-title{
font-size:18px;
font-weight:600;
}

.goal-amount{
color:#37d399;
}

.progress-bar{
height:8px;
background:#2a2f38;
border-radius:10px;
margin-top:15px;
overflow:hidden;
}

.progress{
height:8px;
background:#37d399;
}

.percent{
background:#1d2b24;
color:#37d399;
padding:4px 8px;
border-radius:8px;
font-size:13px;
margin-left:10px;
}

.progress-row{
display:flex;
align-items:center;
}

button{
margin-top:10px;
padding:8px 12px;
border:none;
border-radius:8px;
font-size:14px;
}

.deposit{
background:#37d399;
}

.withdraw{
background:#f87171;
margin-left:8px;
}

.add-goal{
position:fixed;
bottom:90px;
right:25px;
background:#0b0f18;
color:white;
padding:16px 22px;
border-radius:30px;
font-size:18px;
}

.nav{
position:fixed;
bottom:0;
width:100%;
background:#141820;
display:flex;
justify-content:space-around;
padding:12px 0;
}

.nav-item{
text-align:center;
color:#9aa0aa;
font-size:13px;
}

.nav-item.active{
color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="title">My Savings</div>
<div class="premium">✨ Mani Premium</div>
</div>

<div id="goals"></div>

</div>

<div class="add-goal" onclick="addGoal()">
Add Goal +
</div>

<div class="nav">
<div class="nav-item active">🐷<br>Savings</div>
<div class="nav-item">📈<br>Progress</div>
<div class="nav-item">⚙️<br>Settings</div>
</div>

<script>

let goals = JSON.parse(localStorage.goals || "[]")

function save(){
localStorage.goals = JSON.stringify(goals)
}

function addGoal(){

let name = prompt("Goal name")
let target = Number(prompt("Goal amount"))

if(!name || !target) return

goals.push({
name:name,
target:target,
balance:0
})

save()
render()

}

function deposit(i){

let amount = Number(prompt("Deposit amount"))

if(!amount) return

goals[i].balance += amount

save()
render()

}

function withdraw(i){

let amount = Number(prompt("Withdraw amount"))

if(!amount) return

goals[i].balance -= amount

save()
render()

}

function render(){

let container = document.getElementById("goals")

container.innerHTML=""

goals.forEach((g,i)=>{

let percent = (g.balance/g.target)*100

let card = document.createElement("div")

card.className="goal-card"

card.innerHTML = `

<div class="goal-top">
<div class="icon">🎯</div>

<div>
<div class="goal-title"></div>
<div class="goal-amount">₱ / ₱</div>
</div>

</div>

<div class="progress-row">

<div class="progress-bar" style="flex:1">
<div class="progress" style="width:%"></div>
</div>

<div class="percent">%</div>

</div>

<button class="deposit" onclick="deposit()">Deposit</button>
<button class="withdraw" onclick="withdraw()">Withdraw</button>

`

container.appendChild(card)

})

}

render()

</script>

</body>
</html>
